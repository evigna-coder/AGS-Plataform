name: Release sistema-modular

on:
  push:
    tags:
      - 'sistema-modular-v*'

# Permite que el workflow cree releases en este repo.
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write .env.local from secrets
        # Vite a veces no respeta process.env (especialmente en algunos modos);
        # crear .env.local explícitamente es más confiable. Mismo path que en
        # local, así el build CI = build local exactamente.
        # GitHub enmascara automáticamente los secrets en logs, así que esto
        # no expone las keys.
        working-directory: apps/sistema-modular
        shell: bash
        run: |
          cat > .env.local << EOF
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_VAPID_KEY=${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_GOOGLE_OAUTH_CLIENT_ID=${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID }}
          EOF
          # Verifica que se haya creado (sin imprimir contenidos por seguridad)
          if [ -s .env.local ]; then
            echo ".env.local created OK ($(wc -l < .env.local) lines)"
          else
            echo "ERROR: .env.local is empty or missing"
            exit 1
          fi

      - name: Build sistema-modular (vite)
        working-directory: apps/sistema-modular
        # Sin --mode desktop: cargar .env.desktop activaba VITE_DESKTOP_MVP=true
        # que restringe el sidebar a 5 módulos. El usuario quiere todos los
        # módulos visibles (RBAC ya filtra por rol).
        run: pnpm exec vite build

      - name: Build & publish installer (electron-builder)
        working-directory: apps/sistema-modular
        env:
          # GH_TOKEN: token usado por electron-builder para publicar al release de GitHub.
          # Tambien queda embebido en app-update.yml para que el cliente instalado pueda
          # consultar releases de un repo privado.
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: pnpm exec electron-builder --win --publish always
