name: Release sistema-modular

on:
  push:
    tags:
      - 'sistema-modular-v*'

# Permite que el workflow cree releases en este repo.
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sistema-modular (vite)
        working-directory: apps/sistema-modular
        # Vite lee VITE_* del entorno (no solo de .env.local). Acá inyectamos
        # los secrets del repo así el bundle queda buildeado con las API keys.
        # Sin esto, el bundle ship-eaba con `apiKey: undefined` y el cliente
        # tiraba auth/invalid-api-key apenas abría la app.
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID }}
        run: pnpm exec vite build --mode desktop

      - name: Build & publish installer (electron-builder)
        working-directory: apps/sistema-modular
        env:
          # GH_TOKEN: token usado por electron-builder para publicar al release de GitHub.
          # Tambien queda embebido en app-update.yml para que el cliente instalado pueda
          # consultar releases de un repo privado.
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: pnpm exec electron-builder --win --publish always
